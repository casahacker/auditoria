services:
  stack-audit:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
        APP_URL: ${APP_URL}
    image: localhost/stack-audit:latest
    container_name: stack-audit
    restart: on-failure:3
    security_opt:
      - "no-new-privileges:true"
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - APP_URL=${APP_URL}
      - NODE_ENV=production
      - AZURE_DI_ENDPOINT=${AZURE_DI_ENDPOINT:-}
      - AZURE_DI_KEY=${AZURE_DI_KEY:-}
      - EXTRACTION_ENGINE=${EXTRACTION_ENGINE:-local}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - PORTAL_TRANSPARENCIA_KEY=${PORTAL_TRANSPARENCIA_KEY:-}
      - DILIGENCIA_RATE_PER_MIN=${DILIGENCIA_RATE_PER_MIN:-100}
      - DILIGENCIA_SWEEP_MS=${DILIGENCIA_SWEEP_MS:-300000}
      - DILIGENCIA_AUTO=${DILIGENCIA_AUTO:-1}
      - DILIGENCIA_FORCE_REFRESH=${DILIGENCIA_FORCE_REFRESH:-0}
      # KYS/KYG — assinatura via Documenso (template + formValues)
      - DOCUMENSO_URL=${DOCUMENSO_URL:-https://documenso.casahacker.org}
      - DOCUMENSO_API_TOKEN=${DOCUMENSO_API_TOKEN:-}
      - DOCUMENSO_KYS_TEMPLATE_ID=${DOCUMENSO_KYS_TEMPLATE_ID:-}
      - DOCUMENSO_KYG_TEMPLATE_ID=${DOCUMENSO_KYG_TEMPLATE_ID:-}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M   # FEAC treatment (Ghostscript PDF/A + pdf-lib) is heavier than the audit-only baseline
        reservations:
          cpus: '0.25'
          memory: 256M
    volumes:
      - /data/stack-audit/data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    ports:
      - "127.0.0.1:18088:3000"
    networks:
      - stack-audit-net

networks:
  stack-audit-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.89.11.0/24
